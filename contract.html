<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="contrat/contract.css">
    <title>Document</title>
</head>

<body>
    <section>
        <div class="-test">
            <img src="contrat/Honda logo on black background.png" alt="honda" class="header-img">
        </div>
    </section>
    <section>
        <div class="tit">
            <h2>contact us</h2>
        </div>
    </section>
    <section>
        <div>
            <p class="p1">Send us a direct message</p>
            <div class="promo-card">
                <p class="p30">Customers</p>
                <p class="promo-card-heading"></p>
                <p></p>
                <p></p>
            </div>
        </div>
    </section>
    <section class="promo-card-section">

    </section>
    <section class="form-1">
        <form>
            <div class="text-input">
                <label for="name">Name</label>
                <div class="text-input-control">
                    <input id="name" name="name" placeholder="your name" autofocus="autofocus" type="text" required
                        class="Name-b">
                </div>
            </div>

            <div class="text-input-1">
                <label for="email">Email Address</label>
                <div class="text-input-control-1">
                    <input id="email" name="email" placeholder="your email adders" required type="email"
                        class="email-b">
                </div>

            </div>
            <div class="form-control">
                <label class="num-1">Phone Number</label>
                <input class="input input-alt" placeholder="your phone number" required="" type="text">
                <span class="input-border input-border-alt"></span>
            </div>
            <div class="form-control">
                <label class="num-2">Inquiry </label>
                <input class="input input-alt-2" placeholder="The reason of your inquiry" required="" type="text">
                <span class="input-border input-border-alt-2"></span>
                
            </div>
            <div class="description-field">
                <input class="input-des" name="text" type="text" placeholder="Description " required="">
            </div>
            <div class="booooo">
                <button class="gradient-button">
                    <span class="gradient-text">Submit</span>
                </button>
            </div>
        </form>
    </section>
    <br>
    <hr>

</body>


</html>
